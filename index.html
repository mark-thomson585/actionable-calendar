<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>actionable-calendar</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>actionable-calendar</h1>
    <span id="status">connecting…</span>
  </header>

  <main class="layout">
    <section id="day-column">
      <div id="top-sentinel"></div>
      <div id="days"></div>
      <div id="bottom-sentinel"></div>
    </section>
    <aside id="month-column">
      <h2>This Month</h2>
      <ul id="month-list" class="item-list"></ul>
    </aside>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
